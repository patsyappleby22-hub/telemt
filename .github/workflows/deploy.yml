name: Build & Push to Northflank

on:
  push:
    branches: [main]

jobs:
  build-panel:
    name: Build Panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push panel image
        uses: docker/build-push-action@v5
        with:
          context: ./panel
          file: ./panel/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/telemt-panel:latest

  build-bot:
    name: Build Bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push bot image
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          file: ./bot/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/telemt-bot:latest
