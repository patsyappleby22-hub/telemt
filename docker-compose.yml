version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: telemt
      POSTGRES_USER: telemt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemt"]
      interval: 5s
      timeout: 5s
      retries: 10

  panel:
    build:
      context: ./panel
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://telemt:${POSTGRES_PASSWORD:-changeme}@db:5432/telemt
      DATABASE_SSL: "false"
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3000:3000"

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - panel
    environment:
      PANEL_API: http://panel:3000
      NODE_ENV: production

volumes:
  pgdata:
